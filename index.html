<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO - Secure P2P Communications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { cyber: { base: '#030303', surface: '#0A0A0A', border: '#1A1A1A', cyan: '#00E5FF', violet: '#B000FF', emerald: '#00E676' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030303; color: white; overflow: hidden; }
        .glass { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(12px); border-right: 1px solid #1A1A1A; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1A1A1A; border-radius: 4px; }
    </style>
</head>
<body class="flex h-screen w-full antialiased relative">

    <audio id="ringtone" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2873/2873-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="setup-overlay" class="fixed inset-0 bg-cyber-base z-50 flex items-center justify-center hidden">
        <div class="bg-cyber-surface border border-cyber-border p-8 rounded-2xl max-w-md w-full mx-4 shadow-[0_0_50px_rgba(0,229,255,0.05)] text-center">
            <h1 class="text-3xl font-bold font-mono text-transparent bg-clip-text bg-gradient-to-r from-cyber-cyan to-cyber-violet mb-2">ECHO NETWORK</h1>
            <p class="text-gray-400 text-sm mb-6">Initialize your secure communications node.</p>
            <input type="text" id="username-input" placeholder="Enter a unique Username..." class="w-full bg-black border border-cyber-border rounded-xl p-4 text-white font-mono text-sm focus:border-cyber-cyan outline-none transition-colors text-center mb-4">
            <button onclick="initializeSystem()" class="w-full py-4 rounded-xl bg-cyber-cyan/10 border border-cyber-cyan/30 text-cyber-cyan hover:bg-cyber-cyan hover:text-black transition-all font-bold tracking-widest">
                INITIALIZE NODE
            </button>
            <p id="setup-error" class="text-red-500 text-xs mt-4 hidden">Username is active on the network. Choose another.</p>
        </div>
    </div>

    <div id="unlock-overlay" class="fixed inset-0 bg-cyber-base/90 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-cyber-surface border border-cyber-border p-8 rounded-2xl max-w-sm w-full mx-4 text-center shadow-[0_0_30px_rgba(0,230,118,0.1)]">
            <div class="w-16 h-16 bg-cyber-emerald/10 border border-cyber-emerald rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="text-cyber-emerald w-8 h-8"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Session Restored</h2>
            <p class="text-gray-400 text-sm mb-6">Welcome back, <span id="unlock-username" class="text-cyber-cyan font-mono"></span></p>
            <button onclick="unlockSystem()" class="w-full py-3 rounded-xl bg-cyber-emerald/10 border border-cyber-emerald/30 text-cyber-emerald hover:bg-cyber-emerald hover:text-black transition-all font-bold tracking-widest">
                ENTER NETWORK
            </button>
        </div>
    </div>

    <div id="mobile-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-30 hidden md:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 glass flex flex-col z-40 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-cyber-border flex justify-between items-center">
            <h1 class="text-2xl font-bold font-mono tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyber-cyan to-cyber-violet">ECHO</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
        </div>
        
        <div class="p-4 border-b border-cyber-border bg-black/40 flex justify-between items-center">
            <div>
                <label class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mb-1 block">My Node ID</label>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-cyber-emerald animate-pulse"></div>
                    <span id="my-id-display" class="font-mono text-cyber-cyan text-sm font-bold">...</span>
                </div>
            </div>
            <button onclick="editUsername()" class="px-3 py-1.5 bg-cyber-surface border border-cyber-border rounded text-xs text-gray-300 hover:text-cyber-cyan hover:border-cyber-cyan transition-colors flex items-center gap-1 font-bold">
                <i data-lucide="edit" class="w-3 h-3"></i> EDIT
            </button>
        </div>
            
        <div class="p-4 flex-1 overflow-y-auto">
            <label class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mb-3 block">Secure Contacts</label>
            <div class="flex items-center gap-2 mb-4">
                <input type="text" id="add-contact-input" placeholder="Enter friend's username..." class="flex-1 bg-cyber-base border border-cyber-border rounded px-3 py-2 text-white font-mono text-xs focus:border-cyber-violet outline-none">
                <button onclick="addContact()" class="p-2 bg-cyber-violet/20 border border-cyber-violet/50 text-cyber-violet rounded hover:bg-cyber-violet hover:text-white transition-all"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>
            
            <div id="contacts-list" class="space-y-2"></div>
        </div>

        <div class="p-4 border-t border-cyber-border bg-black/40">
            <button onclick="disconnectPeer()" id="disconnect-btn" disabled class="w-full py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-500 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-2 text-sm font-bold">
                <i data-lucide="power" class="w-4 h-4"></i> TERMINATE CONNECTION
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-cyber-base w-full overflow-hidden">
        <header class="h-16 md:h-20 border-b border-cyber-border flex items-center justify-between px-4 md:px-6 bg-black/40 z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-400 hover:text-white"><i data-lucide="menu"></i></button>
                <div>
                    <h2 class="text-base md:text-lg font-bold" id="chat-title">Select a Contact</h2>
                    <p class="text-[10px] md:text-xs text-gray-500 flex items-center gap-2 font-mono mt-0.5">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span> 
                        <span id="header-status">Standby</span>
                    </p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleLocalMic()" id="pre-mic-btn" class="p-2 rounded-lg bg-cyber-surface border border-cyber-border text-gray-400 hover:text-white transition-all">
                    <i data-lucide="mic" id="pre-mic-icon" class="w-4 h-4 md:w-5 md:h-5"></i>
                </button>
                <button onclick="toggleLocalVideo()" id="pre-vid-btn" class="p-2 rounded-lg bg-cyber-surface border border-cyber-border text-gray-400 hover:text-white transition-all">
                    <i data-lucide="camera" id="pre-vid-icon" class="w-4 h-4 md:w-5 md:h-5"></i>
                </button>
                <button onclick="initiateCall()" id="video-btn" disabled class="ml-2 p-2 px-3 md:px-4 rounded-lg bg-cyber-surface border border-cyber-border text-gray-600 transition-all flex items-center gap-2 disabled:opacity-50 font-bold text-xs md:text-sm">
                    <i data-lucide="phone" class="w-4 h-4 md:w-5 md:h-5 text-cyber-emerald"></i> <span class="hidden sm:block">CALL</span>
                </button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col gap-4 pb-24 md:pb-6"></div>

        <div class="absolute bottom-0 left-0 w-full p-3 md:p-6 bg-black/80 backdrop-blur-md border-t border-cyber-border shrink-0">
            <form id="message-form" class="flex items-center gap-2 md:gap-4 max-w-4xl mx-auto">
                <input type="text" id="message-input" disabled autocomplete="off" placeholder="Connect to transmit..." class="flex-1 bg-cyber-surface border border-cyber-border rounded-xl p-3 md:p-4 text-sm text-gray-200 font-mono outline-none focus:border-cyber-cyan disabled:opacity-50">
                <button type="submit" id="send-btn" disabled class="p-3 md:p-4 rounded-xl bg-cyber-cyan/10 border border-cyber-cyan/30 text-cyber-cyan disabled:opacity-50 disabled:text-gray-500 shrink-0">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </main>

    <div id="incoming-call-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-cyber-surface border border-cyber-border p-8 rounded-2xl max-w-sm w-full text-center shadow-[0_0_50px_rgba(0,229,255,0.1)] relative overflow-hidden">
            <div class="absolute inset-0 bg-cyber-cyan/5 animate-pulse"></div>
            <div class="w-20 h-20 bg-cyber-base border-2 border-cyber-cyan rounded-full flex items-center justify-center mx-auto mb-4 relative z-10">
                <i data-lucide="phone-incoming" class="w-8 h-8 text-cyber-cyan animate-bounce"></i>
            </div>
            <h2 class="text-xl font-bold mb-2 relative z-10">Incoming Secure Call</h2>
            <p id="caller-name" class="text-cyber-cyan font-mono mb-8 relative z-10">Unknown Node</p>
            
            <div class="flex gap-4 relative z-10">
                <button onclick="rejectCall()" class="flex-1 py-3 rounded-xl bg-red-500/10 text-red-500 border border-red-500/30 hover:bg-red-500 hover:text-white transition-all font-bold">REJECT</button>
                <button onclick="acceptCall()" class="flex-1 py-3 rounded-xl bg-cyber-emerald/20 text-cyber-emerald border border-cyber-emerald/50 hover:bg-cyber-emerald hover:text-black transition-all font-bold">ACCEPT</button>
            </div>
        </div>
    </div>

    <div id="video-modal" class="fixed inset-0 bg-black z-50 hidden flex-col">
        <div class="absolute top-4 left-4 font-mono text-cyber-cyan text-xs md:text-sm animate-pulse z-20 bg-black/50 p-2 rounded">E2EE MEDIA STREAM // ACTIVE</div>
        <div class="relative w-full h-full flex items-center justify-center bg-cyber-base">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
            <video id="local-video" autoplay muted playsinline class="absolute top-20 right-4 w-24 md:w-48 aspect-video bg-black border-2 border-cyber-border rounded-xl object-cover shadow-2xl z-10"></video>
            <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex items-center gap-4 bg-cyber-surface/80 backdrop-blur-xl border border-white/10 p-3 md:p-4 rounded-3xl z-20">
                <button onclick="toggleLocalMic()" class="p-3 md:p-4 rounded-full bg-cyber-base border border-cyber-border text-white hover:text-cyber-cyan transition-colors active-mic-btn"><i data-lucide="mic" class="w-5 h-5 md:w-6 md:h-6"></i></button>
                <button onclick="toggleLocalVideo()" class="p-3 md:p-4 rounded-full bg-cyber-base border border-cyber-border text-white hover:text-cyber-cyan transition-colors active-vid-btn"><i data-lucide="camera" class="w-5 h-5 md:w-6 md:h-6"></i></button>
                <button onclick="endVideoCall()" class="p-3 md:p-4 rounded-full bg-red-500 text-white hover:bg-red-600 transition-colors shadow-[0_0_20px_rgba(239,68,68,0.4)]"><i data-lucide="phone-off" class="w-5 h-5 md:w-6 md:h-6"></i></button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const setupOverlay = document.getElementById('setup-overlay');
        const unlockOverlay = document.getElementById('unlock-overlay');
        const usernameInput = document.getElementById('username-input');
        const setupError = document.getElementById('setup-error');
        const myIdDisplay = document.getElementById('my-id-display');
        const contactsList = document.getElementById('contacts-list');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const videoBtn = document.getElementById('video-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const chatTitle = document.getElementById('chat-title');
        const statusDot = document.getElementById('status-dot');
        const headerStatus = document.getElementById('header-status');
        const ringtone = document.getElementById('ringtone');

        let peer = null;
        let dataConnection = null;
        let localStream = null;
        let currentCall = null;
        let incomingCall = null;
        let myUsername = '';
        let isAudioMuted = false;
        let isVideoOff = false;

        // --- 1. STARTUP & AUDIO UNLOCK LOGIC ---
        window.onload = () => {
            const savedName = localStorage.getItem('echo_username');
            if (savedName) {
                myUsername = savedName;
                // Show "Welcome Back" screen to force a click (unlocks audio)
                document.getElementById('unlock-username').innerText = myUsername;
                unlockOverlay.classList.remove('hidden');
                unlockOverlay.classList.add('flex');
            } else {
                setupOverlay.classList.remove('hidden');
                setupOverlay.classList.add('flex');
                usernameInput.focus();
            }
            loadContacts();
            
            // Pre-warm camera in background
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => { localStream = stream; document.getElementById('local-video').srcObject = stream; })
                .catch(err => console.warn("Background media access denied."));
        };

        // Triggered when a returning user clicks "Enter Network"
        function unlockSystem() {
            unlockOverlay.classList.replace('flex', 'hidden');
            ringtone.load(); // Browser registers interaction, audio is now unlocked!
            requestNotificationPermission();
            startPeer(myUsername);
        }

        // Triggered when a new user creates a username
        function initializeSystem() {
            const name = usernameInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!name || name.length < 3) return alert("Username must be at least 3 alphanumeric characters.");
            
            ringtone.load(); // Audio unlocked
            requestNotificationPermission();
            
            setupError.classList.add('hidden');
            myUsername = name;
            startPeer(myUsername);
        }

        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        }

        function triggerSystemNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/3059/3059966.png" });
            }
        }

        // --- 2. EDIT USERNAME LOGIC ---
        function editUsername() {
            const confirmEdit = confirm("Editing your username will disconnect your current session. Continue?");
            if (!confirmEdit) return;

            // Deep clean connections
            if (dataConnection) { dataConnection.close(); dataConnection = null; }
            if (currentCall) { currentCall.close(); currentCall = null; }
            if (peer) { peer.destroy(); peer = null; }
            
            // Wipe memory and UI
            localStorage.removeItem('echo_username');
            myUsername = '';
            myIdDisplay.innerText = '...';
            chatBox.innerHTML = ''; 
            resetUI();
            
            // Close mobile sidebar if open
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('mobile-backdrop').classList.add('hidden');

            // Show setup screen
            usernameInput.value = '';
            setupOverlay.classList.remove('hidden');
            setupOverlay.classList.add('flex');
            usernameInput.focus();
        }

        function startPeer(username) {
            if (peer) peer.destroy();
            peer = new Peer(username, { debug: 1 });

            peer.on('open', (id) => {
                localStorage.setItem('echo_username', id); 
                setupOverlay.classList.replace('flex', 'hidden');
                myIdDisplay.innerText = id;
                appendSystemMessage("Node initialized. Connected to global relay.");
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    setupError.classList.remove('hidden'); 
                    localStorage.removeItem('echo_username');
                    setupOverlay.classList.remove('hidden');
                    setupOverlay.classList.add('flex');
                } else {
                    console.error(err);
                }
            });

            peer.on('connection', (conn) => {
                triggerSystemNotification("Secure Connection Request", `${conn.peer} is trying to connect.`);
                setupDataConnection(conn);
            });

            peer.on('call', (call) => {
                incomingCall = call;
                document.getElementById('caller-name').innerText = call.peer;
                document.getElementById('incoming-call-modal').classList.replace('hidden', 'flex');
                
                triggerSystemNotification("Incoming Secure Call", `Receiving encrypted video transmission from ${call.peer}`);
                
                // Audio will now play perfectly because user clicked a button during startup
                ringtone.play().catch(e => console.log("Audio blocked.", e));
            });
        }

        // --- 3. CONTACTS & UI ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('mobile-backdrop');
            sidebar.classList.toggle('-translate-x-full');
            backdrop.classList.toggle('hidden');
        }

        function loadContacts() {
            const contacts = JSON.parse(localStorage.getItem('echo_contacts') || '[]');
            contactsList.innerHTML = '';
            contacts.forEach(c => {
                if(c === myUsername) return; 
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-cyber-surface border border-cyber-border rounded-lg cursor-pointer hover:border-cyber-cyan transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-3" onclick="connectToPartner('${c}')">
                        <div class="w-8 h-8 rounded bg-black border border-cyber-border flex items-center justify-center font-bold text-cyber-cyan text-xs">${c.substring(0,2).toUpperCase()}</div>
                        <span class="font-mono text-sm">${c}</span>
                    </div>
                    <button onclick="removeContact('${c}')" class="text-gray-600 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                contactsList.appendChild(div);
            });
            lucide.createIcons();
        }

        function addContact() {
            const input = document.getElementById('add-contact-input');
            const newContact = input.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if(!newContact || newContact === myUsername) return;

            let contacts = JSON.parse(localStorage.getItem('echo_contacts') || '[]');
            if(!contacts.includes(newContact)) {
                contacts.push(newContact);
                localStorage.setItem('echo_contacts', JSON.stringify(contacts));
                loadContacts();
            }
            input.value = '';
        }

        function removeContact(name) {
            let contacts = JSON.parse(localStorage.getItem('echo_contacts') || '[]');
            contacts = contacts.filter(c => c !== name);
            localStorage.setItem('echo_contacts', JSON.stringify(contacts));
            loadContacts();
        }

        // --- 4. CONNECTION LOGIC ---
        function connectToPartner(partnerId) {
            if(window.innerWidth < 768) toggleSidebar(); 
            appendSystemMessage(`Initializing secure handshake with ${partnerId}...`);
            const conn = peer.connect(partnerId);
            setupDataConnection(conn);
        }

        function setupDataConnection(conn) {
            dataConnection = conn;
            
            dataConnection.on('open', () => {
                chatTitle.innerText = `Connected: ${conn.peer}`;
                statusDot.classList.replace('bg-gray-500', 'bg-cyber-emerald');
                statusDot.classList.add('animate-pulse');
                headerStatus.innerText = "E2EE Secured";
                headerStatus.classList.add('text-cyber-emerald');
                
                messageInput.disabled = false;
                sendBtn.disabled = false;
                videoBtn.disabled = false;
                videoBtn.classList.add('hover:border-cyber-cyan', 'hover:text-cyber-cyan', 'border-cyber-emerald', 'text-cyber-emerald');
                disconnectBtn.disabled = false;
                
                messageInput.placeholder = "Transmit secure payload...";
                messageInput.focus();
                
                chatBox.innerHTML = ''; 
                appendSystemMessage("Handshake verified. E2EE active.");
            });

            dataConnection.on('data', (data) => {
                triggerSystemNotification(`Message from ${conn.peer}`, data);
                appendMessage(data, false);
            });

            dataConnection.on('close', () => {
                appendSystemMessage("Connection terminated by peer.");
                resetUI();
            });
        }

        function disconnectPeer() {
            if (dataConnection) {
                dataConnection.close();
                dataConnection = null;
            }
            if (currentCall) endVideoCall();
            resetUI();
            appendSystemMessage("Connection manually terminated.");
        }

        document.getElementById('message-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !dataConnection) return;

            dataConnection.send(text);
            appendMessage(text, true);
            messageInput.value = '';
        });

        // --- 5. MEDIA TOGGLES & VIDEO CALLS ---
        function toggleLocalMic() {
            isAudioMuted = !isAudioMuted;
            if (localStream) {
                localStream.getAudioTracks().forEach(track => track.enabled = !isAudioMuted);
            }
            const preIcon = document.getElementById('pre-mic-icon');
            preIcon.setAttribute('data-lucide', isAudioMuted ? 'mic-off' : 'mic');
            document.querySelectorAll('.active-mic-btn').forEach(btn => {
                btn.innerHTML = `<i data-lucide="${isAudioMuted ? 'mic-off' : 'mic'}" class="w-5 h-5 md:w-6 md:h-6 ${isAudioMuted ? 'text-red-500' : ''}"></i>`;
            });
            lucide.createIcons();
        }

        function toggleLocalVideo() {
            isVideoOff = !isVideoOff;
            if (localStream) {
                localStream.getVideoTracks().forEach(track => track.enabled = !isVideoOff);
            }
            const preIcon = document.getElementById('pre-vid-icon');
            preIcon.setAttribute('data-lucide', isVideoOff ? 'camera-off' : 'camera');
            document.querySelectorAll('.active-vid-btn').forEach(btn => {
                btn.innerHTML = `<i data-lucide="${isVideoOff ? 'camera-off' : 'camera'}" class="w-5 h-5 md:w-6 md:h-6 ${isVideoOff ? 'text-red-500' : ''}"></i>`;
            });
            lucide.createIcons();
        }

        async function ensureLocalStream() {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('local-video').srcObject = localStream;
                    localStream.getAudioTracks().forEach(track => track.enabled = !isAudioMuted);
                    localStream.getVideoTracks().forEach(track => track.enabled = !isVideoOff);
                } catch (err) {
                    alert("Camera/Microphone access required for calls.");
                    throw err;
                }
            }
        }

        async function initiateCall() {
            if (!dataConnection) return;
            await ensureLocalStream();
            appendSystemMessage("Ringing peer...");
            const call = peer.call(dataConnection.peer, localStream);
            handleCall(call);
        }

        async function acceptCall() {
            ringtone.pause();
            ringtone.currentTime = 0;
            document.getElementById('incoming-call-modal').classList.replace('flex', 'hidden');
            await ensureLocalStream();
            incomingCall.answer(localStream);
            handleCall(incomingCall);
        }

        function rejectCall() {
            ringtone.pause();
            ringtone.currentTime = 0;
            document.getElementById('incoming-call-modal').classList.replace('flex', 'hidden');
            if (incomingCall) {
                incomingCall.close();
                incomingCall = null;
            }
        }

        function handleCall(call) {
            currentCall = call;
            document.getElementById('video-modal').classList.replace('hidden', 'flex');
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });

            call.on('close', () => {
                endVideoCall();
            });
        }

        function endVideoCall() {
            if (currentCall) currentCall.close();
            document.getElementById('video-modal').classList.replace('flex', 'hidden');
            document.getElementById('remote-video').srcObject = null;
            appendSystemMessage("Video transmission ended.");
            currentCall = null;
        }

        // --- 6. UTILS ---
        function appendMessage(text, isMe) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col max-w-[85%] md:max-w-[75%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`;
            msgDiv.innerHTML = `
                <div class="px-4 py-3 rounded-2xl ${isMe ? 'bg-cyber-violet/20 border border-cyber-violet/30 text-white rounded-br-sm' : 'bg-cyber-surface border border-cyber-border text-gray-200 rounded-bl-sm'} shadow-lg break-words w-full">
                    <p class="text-sm">${text}</p>
                </div>
                <span class="text-[10px] text-gray-500 mt-1 font-mono">${time}</span>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "text-center text-[10px] md:text-xs text-cyber-cyan my-2 font-mono tracking-widest uppercase opacity-70";
            msgDiv.innerText = `// ${text} //`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function resetUI() {
            chatTitle.innerText = "Select a Contact";
            statusDot.classList.replace('bg-cyber-emerald', 'bg-gray-500');
            statusDot.classList.remove('animate-pulse');
            headerStatus.innerText = "Standby";
            headerStatus.classList.remove('text-cyber-emerald');
            
            messageInput.disabled = true;
            sendBtn.disabled = true;
            videoBtn.disabled = true;
            disconnectBtn.disabled = true;
            videoBtn.classList.remove('hover:border-cyber-cyan', 'hover:text-cyber-cyan', 'border-cyber-emerald', 'text-cyber-emerald');
            messageInput.placeholder = "Connect to transmit...";
        }
    </script>
</body>
</html>
